# Cloudflare Workers (static assets) config for the Next.js export.
#
# This project deploys as a static-assets Worker. On `npx wrangler deploy` (the default Workers Builds
# deploy command), wrangler first runs [build].command (`next build` -> ./out via output:"export" in
# next.config.mjs), then serves ./out as the Worker's static assets. No server runtime, no dashboard
# build-command change required.
name = "digital-website-twin"
compatibility_date = "2024-11-01"

# Route: digital.buildoutloud.net/* → this worker (configure in dashboard or uncomment routes below)
# Dashboard: Workers & Pages → digital-website-twin → Settings → Domains & Routes
[[routes]]
pattern = "digital.buildoutloud.net/*"
zone_name = "buildoutloud.net"

[build]
command = "NEXT_PUBLIC_DISABLE_AUTH_GATE=true npx next build"

[assets]
directory = "./out"
not_found_handling = "404-page"
